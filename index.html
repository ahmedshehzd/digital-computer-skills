<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>School System Fixed</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Space Grotesk";}

body{
  background:#05060a;
  color:white;
  height:100vh;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:350px;
  padding:30px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:15px;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #333;
  background:#111;
  color:white;
}

button{
  width:100%;
  padding:10px;
  background:linear-gradient(90deg,#00ffd5,#ff2bd6);
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* DASHBOARD */
#dashboard{
  display:none;
  height:100vh;
}

/* SIDEBAR */
.sidebar{
  width:200px;
  background:#0b0f1a;
  padding:15px;
}

.sidebar button{
  width:100%;
  margin:5px 0;
  padding:10px;
  background:transparent;
  border:none;
  color:white;
  text-align:left;
  cursor:pointer;
}

.sidebar button:hover{
  background:rgba(0,255,213,0.1);
}

.main{
  flex:1;
  padding:20px;
}

.section{
  display:none;
}

.active{
  display:block;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h2>Login</h2>
    <input placeholder="Email">
    <input type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="sidebar">
    <h3>Menu</h3>
    <button onclick="show('home')">Dashboard</button>
    <button onclick="show('marks')">Marks</button>
    <button onclick="show('teacher')">Teacher</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">

    <div id="home" class="section active">
      <h2>Dashboard</h2>
      <p>Welcome to system</p>
    </div>

    <div id="marks" class="section">
      <h2>Student Marks</h2>
      <p>Ali - 85</p>
      <p>Ahmed - 72</p>
    </div>

    <div id="teacher" class="section">
      <h2>Teacher Panel</h2>
      <button>Add Student</button>
    </div>

  </div>

</div>

<script>
function login(){
  document.getElementById("login").style.display="none";
  document.getElementById("dashboard").style.display="flex";
}

function logout(){
  document.getElementById("dashboard").style.display="none";
  document.getElementById("login").style.display="flex";
}

function show(id){
  document.querySelectorAll(".section").forEach(s=>{
    s.classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
