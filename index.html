<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>School ERP + Student Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Space Grotesk";}

body{
  background:#05060a;
  color:white;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:360px;
  padding:25px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:15px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  background:#111;
  border:1px solid #333;
  color:white;
}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  background:linear-gradient(90deg,#00ffd5,#ff2bd6);
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* DASHBOARD */
#dashboard{
  display:none;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:230px;
  background:#0b0f1a;
  padding:15px;
}

.sidebar button{
  width:100%;
  margin:5px 0;
  padding:10px;
  background:transparent;
  border:none;
  color:white;
  text-align:left;
  cursor:pointer;
}

.sidebar button:hover{
  background:rgba(0,255,213,0.1);
}

.main{
  flex:1;
  padding:20px;
}

.section{display:none;}
.active{display:block;}

.box{
  padding:12px;
  margin:8px 0;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <h2>ERP Login</h2>

    <input id="role" placeholder="student / teacher / admin">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p style="font-size:12px;opacity:0.6;margin-top:10px;">
      student:111 | teacher:222 | admin:333
    </p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="sidebar">
    <h3>MENU</h3>

    <button onclick="show('home')">Dashboard</button>
    <button onclick="show('profile')">Student Profile</button>
    <button onclick="show('view')">All Profiles</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">

    <!-- HOME -->
    <div id="home" class="section active">
      <h2 id="welcome"></h2>
    </div>

    <!-- STUDENT PROFILE FORM -->
    <div id="profile" class="section">
      <h2>Student Profile Form</h2>

      <input id="name" placeholder="Name">
      <input id="number" placeholder="Phone Number">
      <input id="email" placeholder="Email">
      <input id="course" placeholder="Course">

      <button onclick="saveProfile()">Save Profile</button>
    </div>

    <!-- VIEW PROFILES -->
    <div id="view" class="section">
      <h2>All Student Profiles</h2>
      <div id="list"></div>
    </div>

  </div>
</div>

<script>

let role="";
let profiles=[];

function login(){
  let r=document.getElementById("role").value;
  let p=document.getElementById("pass").value;

  if((r==="student" && p==="111") ||
     (r==="teacher" && p==="222") ||
     (r==="admin" && p==="333")){

    role=r;

    document.getElementById("login").style.display="none";
    document.getElementById("dashboard").style.display="flex";

    document.getElementById("welcome").innerText="Welcome "+role.toUpperCase();

  }else{
    alert("Wrong Login");
  }
}

function logout(){
  document.getElementById("dashboard").style.display="none";
  document.getElementById("login").style.display="flex";
}

function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if(id==="view") renderProfiles();
}

/* SAVE PROFILE (ONLY STUDENT) */
function saveProfile(){

  if(role!=="student"){
    alert("Only students can add profile");
    return;
  }

  let n=document.getElementById("name").value;
  let num=document.getElementById("number").value;
  let e=document.getElementById("email").value;
  let c=document.getElementById("course").value;

  profiles.push({n,num,e,c});

  alert("Profile Saved!");
}

/* SHOW ALL PROFILES */
function renderProfiles(){

  let box=document.getElementById("list");
  box.innerHTML="";

  profiles.forEach(p=>{
    box.innerHTML+=`
      <div class="box">
        <b>${p.n}</b><br>
        📞 ${p.num}<br>
        📧 ${p.e}<br>
        📚 ${p.c}
      </div>
    `;
  });

  if(profiles.length===0){
    box.innerHTML="No profiles yet";
  }
}

</script>

</body>
</html>
