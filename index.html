<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Class System</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:20px;
}

.box{
background:white;
padding:20px;
max-width:700px;
margin:auto;
border-radius:10px;
}

input,button{
width:100%;
padding:10px;
margin:5px 0;
}

button{
background:black;
color:white;
border:none;
cursor:pointer;
}

.hidden{display:none;}

.student{
padding:10px;
background:#eee;
margin:5px 0;
cursor:pointer;
}

.task{
display:flex;
align-items:center;
gap:10px;
margin:5px 0;
}

.progress{
background:#ddd;
height:20px;
border-radius:10px;
overflow:hidden;
}

.bar{
height:20px;
background:green;
width:0%;
}
</style>

</head>

<body>

<div class="box">

<h2>Teacher System Login</h2>

<input id="user" placeholder="Username">
<input id="pass" placeholder="Password">

<button onclick="login()">Login</button>

<hr>

<div id="panel" class="hidden">

<h2>Teacher Dashboard</h2>

<input id="sname" placeholder="Student Name">
<input id="spass" placeholder="Student Password">

<button onclick="addStudent()">Add Student</button>

<div id="students"></div>

<hr>

<h3>Tasks</h3>

<input id="task" placeholder="Add Task">
<button onclick="addTask()">Add Task</button>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<p id="percent"></p>

<div id="taskList"></div>

<hr>

<h3>Activity Log</h3>

<input id="logText" placeholder="Work done">
<input id="logDate" placeholder="Date">

<button onclick="addLog()">Add Log</button>

<div id="logs"></div>

</div>

</div>

<script>

let students = JSON.parse(localStorage.getItem("students")) || [];
let selected = null;

// LOGIN
function login(){
let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

if(u === "Teacher" && p === "628628"){
document.getElementById("panel").classList.remove("hidden");
loadStudents();
}
else{
alert("Wrong Username or Password");
}
}

// ADD STUDENT
function addStudent(){

let name = document.getElementById("sname").value;
let pass = document.getElementById("spass").value;

if(students.find(s => s.name === name)){
alert("Student already exists");
return;
}

students.push({
name:name,
pass:pass,
tasks:[],
logs:[]
});

localStorage.setItem("students",JSON.stringify(students));
loadStudents();
}

// LOAD STUDENTS
function loadStudents(){

let div = document.getElementById("students");
div.innerHTML="";

students.forEach((s,i)=>{
div.innerHTML += `<div class="student" onclick="selectStudent(${i})">${s.name}</div>`;
});

}

// SELECT STUDENT
function selectStudent(i){
selected = i;
loadTasks();
loadLogs();
}

// ADD TASK
function addTask(){

if(selected === null) return;

let t = document.getElementById("task").value;

students[selected].tasks.push({
text:t,
done:false
});

localStorage.setItem("students",JSON.stringify(students));
loadTasks();
}

// LOAD TASKS
function loadTasks(){

if(selected === null) return;

let div = document.getElementById("taskList");
div.innerHTML="";

let tasks = students[selected].tasks;
let done = 0;

tasks.forEach((t,i)=>{

if(t.done) done++;

div.innerHTML += `
<div class="task">
<input type="checkbox" onchange="toggle(${i})" ${t.done?"checked":""}>
${t.text}
</div>`;
});

let percent = tasks.length ? Math.round((done/tasks.length)*100) : 0;

document.getElementById("bar").style.width = percent + "%";
document.getElementById("percent").innerText = percent + "% Completed";

}

// TOGGLE TASK
function toggle(i){

students[selected].tasks[i].done =
!students[selected].tasks[i].done;

localStorage.setItem("students",JSON.stringify(students));
loadTasks();
}

// ADD LOG
function addLog(){

if(selected === null) return;

let text = document.getElementById("logText").value;
let date = document.getElementById("logDate").value;

students[selected].logs.push({
text:text,
date:date
});

localStorage.setItem("students",JSON.stringify(students));
loadLogs();
}

// LOAD LOGS
function loadLogs(){

if(selected === null) return;

let div = document.getElementById("logs");
div.innerHTML="";

students[selected].logs.forEach(l=>{
div.innerHTML += `<div>📅 ${l.date} - ${l.text}</div>`;
});
}

</script>

</body>
</html>
