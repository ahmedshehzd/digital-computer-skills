<!DOCTYPE html>
<html>
<head>
<title>Digital Computer Skill System</title>
<style>
body{font-family:Arial;background:#f4f4f4;margin:0;padding:20px}
.box{background:#fff;padding:15px;border-radius:10px;max-width:600px;margin:auto}
input,button{width:100%;padding:10px;margin:5px 0}
button{background:black;color:white;border:none;cursor:pointer}
.hidden{display:none}
.student{padding:10px;background:#eee;margin:5px 0;cursor:pointer}
.task{display:flex;align-items:center;gap:10px}
.progress{background:#ddd;height:20px;border-radius:10px;overflow:hidden}
.bar{height:20px;background:green;width:0%}
</style>
</head>

<body>

<div class="box">

<h2>Login</h2>

<input id="name" placeholder="Name">
<input id="pass" placeholder="Password">

<button onclick="teacherLogin()">Teacher Login</button>
<button onclick="studentLogin()">Student Login</button>

<hr>

<div id="teacherPanel" class="hidden">

<h2>Teacher Dashboard</h2>

<input id="newStudent" placeholder="New Student Name">
<input id="newPass" placeholder="Set Password">
<button onclick="addStudent()">Add Student</button>

<div id="students"></div>

<hr>

<h3>Tasks</h3>
<input id="taskText" placeholder="Add Task">
<button onclick="addTask()">Add Task</button>

<div class="progress"><div class="bar" id="bar"></div></div>
<p id="percent"></p>

<div id="taskList"></div>

<hr>

<h3>Activity Log</h3>
<input id="logText" placeholder="Work done">
<input id="logDate" placeholder="Date">
<button onclick="addLog()">Add Log</button>

<div id="logs"></div>

</div>

</div>

<script>

let students = JSON.parse(localStorage.getItem("students")) || [];
let selected = null;

// TEACHER LOGIN
function teacherLogin(){
 if(document.getElementById("pass").value === "628628"){
   document.getElementById("teacherPanel").classList.remove("hidden");
   loadStudents();
 } else {
   alert("Wrong Teacher Password");
 }
}

// STUDENT LOGIN
function studentLogin(){
 let name = document.getElementById("name").value;
 let pass = document.getElementById("pass").value;

 let user = students.find(s => s.name === name && s.pass === pass);

 if(user){
   alert("Student Login Success");
   selected = students.indexOf(user);
   loadTasks();
   loadLogs();
   document.getElementById("teacherPanel").classList.remove("hidden");
 } else {
   alert("Invalid Student Login");
 }
}

// ADD STUDENT (NO DUPLICATE)
function addStudent(){
 let name = document.getElementById("newStudent").value;
 let pass = document.getElementById("newPass").value;

 if(students.find(s=>s.name===name)){
   alert("Student Already Exists");
   return;
 }

 students.push({name, pass, tasks:[], logs:[]});
 localStorage.setItem("students", JSON.stringify(students));
 loadStudents();
}

// LOAD STUDENTS
function loadStudents(){
 let div = document.getElementById("students");
 div.innerHTML="";

 students.forEach((s,i)=>{
   div.innerHTML += `<div class='student' onclick='selectStudent(${i})'>${s.name}</div>`;
 });
}

// SELECT STUDENT
function selectStudent(i){
 selected = i;
 loadTasks();
 loadLogs();
}

// ADD TASK
function addTask(){
 if(selected===null) return;

 let t = document.getElementById("taskText").value;

 students[selected].tasks.push({text:t,done:false});
 localStorage.setItem("students",JSON.stringify(students));
 loadTasks();
}

// LOAD TASKS + PROGRESS
function loadTasks(){
 if(selected===null) return;

 let div = document.getElementById("taskList");
 div.innerHTML="";

 let tasks = students[selected].tasks;
 let done = 0;

 tasks.forEach((t,i)=>{
   if(t.done) done++;

   div.innerHTML += `
   <div class='task'>
   <input type='checkbox' onchange='toggleTask(${i})' ${t.done?"checked":""}>
   ${t.text}
   </div>`;
 });

 let percent = tasks.length ? Math.round((done/tasks.length)*100) : 0;
 document.getElementById("bar").style.width = percent+"%";
 document.getElementById("percent").innerText = percent+"% Completed";
}

// TOGGLE TASK
function toggleTask(i){
 students[selected].tasks[i].done = !students[selected].tasks[i].done;
 localStorage.setItem("students",JSON.stringify(students));
 loadTasks();
}

// ADD LOG
function addLog(){
 if(selected===null) return;

 let text = document.getElementById("logText").value;
 let date = document.getElementById("logDate").value;

 students[selected].logs.push({text,date});
 localStorage.setItem("students",JSON.stringify(students));
 loadLogs();
}

// LOAD LOGS
function loadLogs(){
 if(selected===null) return;

 let div = document.getElementById("logs");
 div.innerHTML="";

 students[selected].logs.forEach(l=>{
   div.innerHTML += `<div>📅 ${l.date} - ${l.text}</div>`;
 });
}

</script>

</body>
</html>
