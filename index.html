<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>School System</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#05060a;
  --panel:rgba(255,255,255,0.06);
  --stroke:rgba(255,255,255,0.12);
  --neon:#00ffd5;
  --pink:#ff2bd6;
  --text:#e7e7ff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:"Space Grotesk",sans-serif;}

body{
  background: radial-gradient(circle at top, #0b1020, #05060a);
  color:var(--text);
  height:100vh;
  overflow:hidden;
}

/* LOGIN SCREEN */
.login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.card{
  width:360px;
  padding:35px;
  background:var(--panel);
  border:1px solid var(--stroke);
  border-radius:18px;
  backdrop-filter:blur(15px);
}

h2{margin-bottom:5px;}

p{opacity:0.7;font-size:13px;margin-bottom:20px;}

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid var(--stroke);
  background:rgba(0,0,0,0.3);
  color:white;
  outline:none;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,var(--neon),var(--pink));
  color:#000;
  font-weight:700;
  cursor:pointer;
}

/* DASHBOARD */
.dashboard{
  display:none;
  height:100vh;
  display:flex;
}

.sidebar{
  width:220px;
  background:rgba(255,255,255,0.03);
  border-right:1px solid var(--stroke);
  padding:20px;
}

.logo{
  color:var(--neon);
  font-weight:700;
  margin-bottom:20px;
}

.menu button{
  width:100%;
  padding:10px;
  margin:6px 0;
  background:transparent;
  border:none;
  color:white;
  text-align:left;
  cursor:pointer;
  border-radius:8px;
}

.menu button:hover{
  background:rgba(0,255,213,0.1);
}

.main{
  flex:1;
  padding:20px;
}

.cardbox{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.box{
  padding:15px;
  background:var(--panel);
  border:1px solid var(--stroke);
  border-radius:15px;
}

table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

th{color:var(--neon);}

/* hidden */
.hidden{display:none;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <div class="card">
    <h2>Login Portal</h2>
    <p>Student & Teacher System</p>

    <input id="user" type="text" placeholder="Email or ID">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="logo">SCHOOL OS</div>

    <div class="menu">
      <button onclick="showSection('home')">Dashboard</button>
      <button onclick="showSection('marks')">Marks</button>
      <button onclick="showSection('teacher')">Teacher Panel</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- HOME -->
    <div id="home">
      <h2>Welcome 👋</h2>

      <div class="cardbox">
        <div class="box">Students: 1200</div>
        <div class="box">Teachers: 80</div>
        <div class="box">Performance: 78%</div>
      </div>
    </div>

    <!-- MARKS -->
    <div id="marks" class="hidden">
      <h2>Student Marks</h2>

      <table>
        <tr>
          <th>Name</th>
          <th>Subject</th>
          <th>Marks</th>
        </tr>
        <tr>
          <td>Ali</td>
          <td>Math</td>
          <td>85</td>
        </tr>
        <tr>
          <td>Ahmed</td>
          <td>Science</td>
          <td>72</td>
        </tr>
      </table>
    </div>

    <!-- TEACHER -->
    <div id="teacher" class="hidden">
      <h2>Teacher Panel</h2>

      <div class="box">
        <p>Add Students / Enter Marks / Attendance</p>
        <button style="margin-top:10px;">+ Add Student</button>
      </div>
    </div>

  </div>
</div>

<script>
function login(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("dashboard").style.display="flex";
}

function logout(){
  document.getElementById("dashboard").style.display="none";
  document.getElementById("loginPage").style.display="flex";
}

function showSection(id){
  document.querySelectorAll(".main > div").forEach(d=>d.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}
</script>

</body>
</html>
