<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ahmed ERP System</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Space Grotesk";}

body{
  background:#05060a;
  color:white;
}

/* LOGIN */
#login{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.brand{
  font-size:22px;
  font-weight:700;
  margin-bottom:15px;
  color:#00ffd5;
}

.card{
  width:360px;
  padding:25px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:15px;
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:8px;
  background:#111;
  border:1px solid #333;
  color:white;
}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  background:linear-gradient(90deg,#00ffd5,#ff2bd6);
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* DASHBOARD */
#dashboard{
  display:none;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:230px;
  background:#0b0f1a;
  padding:15px;
}

.sidebar h2{
  color:#00ffd5;
}

.sidebar button{
  width:100%;
  margin:5px 0;
  padding:10px;
  background:transparent;
  border:none;
  color:white;
  text-align:left;
  cursor:pointer;
  border-radius:8px;
}

.sidebar button:hover{
  background:rgba(0,255,213,0.1);
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

.section{display:none;}
.active{display:block;}

.box{
  padding:12px;
  margin:8px 0;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:12px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">

  <div class="brand">Ahmed Digital ERP</div>

  <div class="card">
    <h3>Login</h3>

    <input id="role" placeholder="student / teacher / admin">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p style="font-size:12px;opacity:0.6;margin-top:10px;">
      student:111 | teacher:222 | admin:333
    </p>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <div class="sidebar">
    <h2>MENU</h2>

    <button onclick="show('home')">Dashboard</button>
    <button onclick="show('work')">Work Panel</button>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="main">

    <div id="home" class="section active">
      <h2 id="welcome"></h2>
    </div>

    <div id="work" class="section">

      <div class="box">
        <h3>Add Lesson</h3>
        <input placeholder="Topic">
        <input placeholder="Description">
        <button onclick="action('lesson')">Add Lesson</button>
      </div>

      <div class="box">
        <h3>Marks</h3>
        <input placeholder="Student Name">
        <input placeholder="Marks">
        <button onclick="action('marks')">Save Marks</button>
      </div>

      <div class="box">
        <h3>Attendance</h3>
        <button onclick="action('att')">Mark Attendance</button>
      </div>

      <div id="adminBox" class="box" style="display:none;">
        <h3>🔴 Admin Control</h3>
        <button>Delete Student</button>
        <button>System Settings</button>
      </div>

    </div>

  </div>
</div>

<script>

let role="";

function login(){

  let r=document.getElementById("role").value;
  let p=document.getElementById("pass").value;

  if(r==="student" && p==="111") role="student";
  else if(r==="teacher" && p==="222") role="teacher";
  else if(r==="admin" && p==="333") role="admin";
  else return alert("Wrong login");

  document.getElementById("login").style.display="none";
  document.getElementById("dashboard").style.display="flex";

  document.getElementById("welcome").innerText =
    "Welcome, " + role.toUpperCase();

  if(role==="admin"){
    document.getElementById("adminBox").style.display="block";
  }
}

function action(type){

  if(role==="student"){
    alert("Access Denied");
    return;
  }

  alert(type + " action executed");
}

function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function logout(){
  document.getElementById("dashboard").style.display="none";
  document.getElementById("login").style.display="flex";
}

</script>

</body>
</html>
