<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Teacher Class System</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:0;
}

.login-box,.dashboard{
max-width:900px;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
}

button{
padding:10px 15px;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

.hidden{
display:none;
}

.student-card{
background:#eee;
padding:10px;
margin-top:10px;
border-radius:5px;
}

.progress{
width:100%;
background:#ddd;
height:20px;
border-radius:10px;
overflow:hidden;
}

.bar{
height:20px;
background:green;
width:0%;
}
</style>
</head>

<body>

<div class="login-box" id="loginPage">

<h2>Teacher Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div class="dashboard hidden" id="dashboard">

<h1>Teacher Dashboard</h1>

<h3>Add Student</h3>

<input id="studentName" placeholder="Student Name">

<input id="studentPass" placeholder="Student Password">

<button onclick="addStudent()">Add Student</button>

<hr>

<div id="students"></div>

</div>

<script>

let students=[];

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user==="Teacher" && pass==="628628"){

document.getElementById("loginPage").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");

}else{

alert("Wrong Username or Password");

}

}

function addStudent(){

let name=document.getElementById("studentName").value;
let pass=document.getElementById("studentPass").value;

if(name==="") return;

students.push({
name:name,
pass:pass,
course:"",
tasks:[],
notes:""
});

renderStudents();

}

function renderStudents(){

let html="";

students.forEach((s,index)=>{

html+=`

<div class="student-card">

<h3>${s.name}</h3>

<p><b>Password:</b> ${s.pass}</p>

<input placeholder="Course Name"
onchange="students[${index}].course=this.value">

<input placeholder="Add Task"
id="task${index}">

<button onclick="addTask(${index})">
Add Task
</button>

<div id="tasks${index}"></div>

<br>

<textarea
placeholder="Teacher Notes"
onchange="students[${index}].notes=this.value">
</textarea>

<div class="progress">

<div class="bar" id="bar${index}"></div>

</div>

</div>

`;

});

document.getElementById("students").innerHTML=html;

}

function addTask(i){

let task=document.getElementById("task"+i).value;

students[i].tasks.push({
text:task,
done:false
});

showTasks(i);

}

function showTasks(i){

let html="";
let done=0;

students[i].tasks.forEach((t,x)=>{

if(t.done) done++;

html+=`
<label>

<input type="checkbox"
onchange="toggleTask(${i},${x})"
${t.done?"checked":""}>

${t.text}

</label><br>
`;

});

document.getElementById("tasks"+i).innerHTML=html;

let percent=0;

if(students[i].tasks.length>0){

percent=Math.round(
(done/students[i].tasks.length)*100
);

}

document.getElementById("bar"+i).style.width=
percent+"%";

}

function toggleTask(i,x){

students[i].tasks[x].done=
!students[i].tasks[x].done;

showTasks(i);

}

</script>

</body>
</html>
