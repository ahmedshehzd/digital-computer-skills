<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Management System</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#0f172a;
    color:white;
}

/* Top Header */
.header{
    background:#1e293b;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

/* Login Box */
.container{
    width:300px;
    margin:80px auto;
    background:#1e293b;
    padding:20px;
    border-radius:10px;
}

input, select{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#22c55e;
    border:none;
    color:white;
    font-weight:bold;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#16a34a;
}

/* Dashboard */
.dashboard{
    display:none;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}

.progress{
    height:10px;
    background:#334155;
    border-radius:5px;
}

.progress-bar{
    height:10px;
    background:#22c55e;
    width:50%;
    border-radius:5px;
}

.plus{
    font-size:25px;
    background:#22c55e;
    width:40px;
    height:40px;
    text-align:center;
    border-radius:50%;
    cursor:pointer;
    margin:10px 0;
}
</style>
</head>

<body>

<div class="header">Computer Course Management System</div>

<!-- LOGIN SCREEN -->
<div id="loginBox" class="container">

<h3>Login</h3>

<select id="role">
<option value="teacher">Teacher Login</option>
<option value="student">Student Login</option>
</select>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<!-- TEACHER DASHBOARD -->
<div id="teacherDashboard" class="dashboard">

<h2>Teacher Dashboard</h2>

<div class="plus" onclick="addStudent()">+</div>
<p>Add New Student</p>

<div class="card">
<h3>Student List</h3>
<div id="studentList"></div>
</div>

</div>

<!-- STUDENT DASHBOARD -->
<div id="studentDashboard" class="dashboard">

<h2>Student Dashboard</h2>

<div class="card">
<h3>Your Progress</h3>

<div class="progress">
<div class="progress-bar"></div>
</div>

<p>Course: MS Excel</p>
</div>

<div class="card">
<h3>Today's Class</h3>
<p>Topic: Basic Formulas</p>
<p>Description: Today we learned SUM and AVERAGE formulas.</p>
</div>

</div>

<script>

let students = [];

function login(){
    let role = document.getElementById("role").value;
    
    document.getElementById("loginBox").style.display="none";

    if(role === "teacher"){
        document.getElementById("teacherDashboard").style.display="block";
    } else {
        document.getElementById("studentDashboard").style.display="block";
    }
}

/* Add Student */
function addStudent(){
    let name = prompt("Enter Student Name:");
    let pass = prompt("Set Password:");

    students.push({name:name, pass:pass});

    renderStudents();
}

/* Show Students */
function renderStudents(){
    let list = document.getElementById("studentList");
    list.innerHTML = "";

    students.forEach((s,i)=>{
        list.innerHTML += `
        <p>👨‍🎓 ${s.name} - Password: ${s.pass}</p>
        `;
    });
}

</script>

</body>
</html>
